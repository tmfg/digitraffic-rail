name: Fuzz
on:
  schedule:
    - cron: "0 8 * * *" # UTC
  workflow_dispatch:
jobs:
  fuzz:
    if: github.repository != 'tmfg/digitraffic-rail'
    runs-on: ubuntu-24.04
    steps:
      - name: Fuzz
        uses: mprencipe/waggers-action@d8c6cbcf4b3285bb579b8a4b556b67a113a842bd # v4
        with:
          url: https://rata-beta.digitraffic.fi/swagger/openapi.json
          fuzzcount: 5
          headers: "digitraffic-user:internal-digitraffic-fuzz"
      - name: Notify Slack
        if: failure()
        uses: tmfg/digitraffic-actions@slack-notify/v1
        with:
          status: failure
          text: FAILED Rail fuzz
          fields: repo, job, took
          webhook-url: ${{ secrets.SLACK_WARNINGS_WEBHOOK_URL }}
